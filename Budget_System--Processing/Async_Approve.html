<!DOCTYPE html>
<html>
<head>
    <base target="_top">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; background: #f5f5f5; margin: 0; }
        .card { background: white; padding: 40px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); text-align: center; max-width: 400px; width: 90%; }
        .spinner { border: 4px solid #f3f3f3; border-top: 4px solid #19573B; border-radius: 50%; width: 50px; height: 50px; animation: spin 1s linear infinite; margin: 0 auto 20px auto; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        h2 { color: #333; margin-bottom: 10px; }
        p { color: #666; font-size: 14px; }
        .success-icon { display: none; color: #19573B; font-size: 50px; margin-bottom: 20px; }
        .error-icon { display: none; color: #dc3545; font-size: 50px; margin-bottom: 20px; }
    </style>
</head>
<body>
    <div class="card">
        <div id="loader" class="spinner"></div>
        <div id="success" class="success-icon">✓</div>
        <div id="error" class="error-icon">✕</div>
        <h2 id="title">Processing Approval...</h2>
        <p id="message">Please wait while the engine executes the transaction.</p>
    </div>

    <script>
        // Start background process instantly using token injected by doGet
        function start() {
            var token = "<?= token ?>";
            var decision = "<?= decision ?>";
            google.script.run
                .withSuccessHandler(function(response) {
                    document.getElementById('loader').style.display = 'none';
                    if (response.success) {
                        document.getElementById('success').style.display = 'block';
                        document.getElementById('title').innerText = "Request Approved";
                        document.getElementById('title').style.color = "#19573B";
                        document.getElementById('message').innerText = "You can safely close this window.";
                    } else {
                        document.getElementById('error').style.display = 'block';
                        document.getElementById('title').innerText = "Action Failed";
                        document.getElementById('title').style.color = "#dc3545";
                        document.getElementById('message').innerText = response.error || "An unknown error occurred.";
                    }
                })
                .withFailureHandler(function(err) {
                    document.getElementById('loader').style.display = 'none';
                    document.getElementById('error').style.display = 'block';
                    document.getElementById('title').innerText = "System Error";
                    document.getElementById('title').style.color = "#dc3545";
                    document.getElementById('message').innerText = "Could not contact backend processing server.";
                })
                .processApprovalDecisionViaClient(token, decision); // Calls backend trigger function!
        }
        window.onload = start;
    </script>
</body>
</html>
